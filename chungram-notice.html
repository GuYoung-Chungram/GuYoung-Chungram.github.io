<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ═══ 보안킷 (Security Kit) ═══ -->
  <script src="보안킷/security.js"></script>
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <meta name="author" content="청람M&C 정구영 대표">
  <meta name="copyright" content="© 2025 청람M&C AI Lab. All Rights Reserved.">
  <meta name="CCBot" content="noindex">
  <meta name="GPTBot" content="noindex">
  <meta name="anthropic-ai" content="noindex">
  <meta name="Google-Extended" content="noindex">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <!-- ═══ /보안킷 ═══ -->
<title>CHUNGRAM — 공지사항</title>
<meta name="description" content="청람M&C AI Lab 공지사항 게시판">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg2: #0a0a0a;
    --bg3: #111111;
    --bg4: #1a1a1a;
    --accent: #D4FF5E;
    --accent2: #b8e040;
    --text: #ffffff;
    --text2: #aaaaaa;
    --text3: #666666;
    --border: #222222;
    --border2: #333333;
    --red: #ff4444;
    --blue: #5eaaff;
    --font-mono: 'Space Mono', monospace;
    --font-kr: 'Noto Sans KR', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-kr);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 스캔라인 배경 텍스처 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(212,255,94,0.012) 2px,
      rgba(212,255,94,0.012) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* ═══════════════ NAV ═══════════════ */
  nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border2);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .nav-logo:hover { color: var(--accent); }
  .logo-mark {
    width: 32px; height: 32px;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--accent);
    font-family: var(--font-mono);
    transition: background 0.2s;
  }
  .nav-logo:hover .logo-mark { background: var(--accent); color: #000; }

  .nav-menu {
    display: flex;
    align-items: center;
    gap: 6px;
    list-style: none;
  }
  .nav-menu a {
    display: block;
    padding: 6px 14px;
    color: var(--text2);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .nav-menu a:hover,
  .nav-menu a.active {
    color: var(--accent);
    border-color: var(--accent);
  }
  .nav-badge {
    padding: 4px 10px;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
  }

  /* ═══════════════ HERO HEADER ═══════════════ */
  .page-header {
    position: relative;
    padding: 80px 40px 60px;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    z-index: 1;
  }
  .page-header::before {
    content: 'NOTICE';
    position: absolute;
    right: -20px; top: 10px;
    font-family: var(--font-mono);
    font-size: 160px;
    font-weight: 700;
    color: rgba(212,255,94,0.03);
    letter-spacing: -5px;
    pointer-events: none;
    user-select: none;
  }
  .header-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 16px;
    border: 1px solid var(--accent);
    padding: 4px 12px;
  }
  .header-tag::before { content: '▶ '; }
  .page-header h1 {
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .page-header h1 span { color: var(--accent); }
  .page-header p {
    font-size: 15px;
    color: var(--text2);
    font-weight: 300;
  }

  /* ═══════════════ MAIN LAYOUT ═══════════════ */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px;
    position: relative;
    z-index: 1;
  }

  .board-wrap {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 40px;
    padding: 48px 0 80px;
  }

  /* ═══════════════ 필터 툴바 ═══════════════ */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-family: var(--font-kr);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }
  .search-wrap {
    margin-left: auto;
    position: relative;
  }
  .search-wrap input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 7px 36px 7px 14px;
    font-family: var(--font-kr);
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap::after {
    content: '🔍';
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    pointer-events: none;
  }

  /* ═══════════════ 게시글 목록 ═══════════════ */
  .post-list { display: flex; flex-direction: column; gap: 1px; }

  .post-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .post-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.2s;
  }
  .post-item:hover { border-color: var(--border2); background: var(--bg3); }
  .post-item:hover::before { background: var(--accent); }
  .post-item.pinned { border-color: rgba(212,255,94,0.3); }
  .post-item.pinned::before { background: var(--accent); }

  .post-summary {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .post-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    min-width: 32px;
    text-align: center;
  }
  .pin-icon {
    font-size: 14px;
    min-width: 32px;
    text-align: center;
  }
  .post-category {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border: 1px solid;
    min-width: 64px;
    text-align: center;
    flex-shrink: 0;
  }
  .cat-notice { color: var(--accent); border-color: var(--accent); }
  .cat-update { color: var(--blue); border-color: var(--blue); }
  .cat-event  { color: #ff9f5e; border-color: #ff9f5e; }
  .cat-edu    { color: #c45eff; border-color: #c45eff; }
  .cat-ai     { color: #5effce; border-color: #5effce; }

  .post-title-wrap { flex: 1; min-width: 0; }
  .post-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
    transition: color 0.2s;
  }
  .post-item:hover .post-title { color: var(--accent); }
  .post-item.pinned .post-title { font-weight: 700; }
  .post-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text3);
    font-family: var(--font-mono);
  }
  .post-date::before { content: '📅 '; font-size: 9px; }
  .post-new {
    display: inline-block;
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  .post-views {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .post-views::before { content: '👁 '; font-size: 9px; }

  /* ═══════════════ 게시글 상세 (accordion) ═══════════════ */
  .post-detail {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--bg3);
    padding: 28px 24px 28px 76px;
    animation: slideDown 0.25s ease;
  }
  .post-detail.open { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detail-content {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text2);
    white-space: pre-line;
  }
  .detail-content strong { color: var(--accent); font-weight: 700; }
  .detail-content a { color: var(--blue); text-decoration: underline; }

  .detail-footer {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .detail-author {
    font-size: 12px;
    color: var(--text3);
    font-family: var(--font-mono);
  }
  .detail-author span { color: var(--accent); }
  .close-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    padding: 5px 14px;
    font-size: 11px;
    cursor: pointer;
    font-family: var(--font-kr);
    transition: all 0.2s;
  }
  .close-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ═══════════════ 사이드바 ═══════════════ */
  .sidebar { display: flex; flex-direction: column; gap: 24px; }

  .widget {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 24px;
  }
  .widget-title {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .widget-title::before { content: '// '; }

  /* 통계 위젯 */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-item { text-align: center; padding: 12px; background: var(--bg3); }
  .stat-num {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }
  .stat-label { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* 카테고리 위젯 */
  .cat-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .cat-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text2);
  }
  .cat-list li:hover { background: var(--bg3); color: var(--accent); }
  .cat-list li .dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
  .cat-list li span:last-child {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
  }

  /* 최근 게시글 */
  .recent-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .recent-list li {
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    line-height: 1.5;
    padding: 8px 10px;
    border-left: 2px solid var(--border);
    transition: all 0.15s;
  }
  .recent-list li:hover { border-color: var(--accent); color: var(--accent); }
  .recent-date { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--text3); margin-top: 3px; }

  /* 관리자 버튼 */
  .admin-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-kr);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .admin-btn:hover { background: var(--accent); color: #000; }

  /* ═══════════════ 페이지네이션 ═══════════════ */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 32px;
  }
  .page-btn {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  /* ═══════════════ 모달 (글쓰기) ═══════════════ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    width: min(600px, 90vw);
    max-height: 85vh;
    overflow-y: auto;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .modal-header h3::before { content: '// '; }
  .modal-close {
    background: none; border: none; color: var(--text3);
    font-size: 20px; cursor: pointer; padding: 0;
    transition: color 0.2s; line-height: 1;
  }
  .modal-close:hover { color: var(--accent); }

  .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    font-family: var(--font-mono);
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 14px;
    font-family: var(--font-kr);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 160px; line-height: 1.7; }
  .form-group select option { background: var(--bg3); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-check {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
  }
  .form-check input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .btn-submit {
    flex: 1;
    padding: 12px;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: var(--font-kr);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover { background: var(--accent2); }
  .btn-cancel {
    padding: 12px 20px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-family: var(--font-kr);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--text3); color: var(--text); }

  /* ═══════════════ PWD 프롬프트 ═══════════════ */
  .pwd-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 3000;
    align-items: center;
    justify-content: center;
  }
  .pwd-overlay.open { display: flex; }
  .pwd-box {
    background: var(--bg2);
    border: 1px solid var(--accent);
    padding: 36px;
    width: 320px;
    text-align: center;
  }
  .pwd-box h4 {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 20px;
  }
  .pwd-box input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 14px;
    font-size: 16px;
    text-align: center;
    letter-spacing: 0.3em;
    outline: none;
    margin-bottom: 14px;
    font-family: var(--font-mono);
  }
  .pwd-box input:focus { border-color: var(--accent); }
  .pwd-error { color: var(--red); font-size: 11px; margin-bottom: 10px; display: none; }
  .pwd-btns { display: flex; gap: 8px; }
  .pwd-btns button {
    flex: 1;
    padding: 10px;
    font-family: var(--font-kr);
    font-size: 13px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .pwd-confirm { background: var(--accent); color: #000; font-weight: 700; }
  .pwd-confirm:hover { background: var(--accent2); }
  .pwd-cancel { background: var(--bg4); color: var(--text2); border: 1px solid var(--border2) !important; }

  /* ═══════════════ FOOTER ═══════════════ */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text3);
    font-family: var(--font-mono);
    position: relative;
    z-index: 1;
  }
  footer a { color: var(--text3); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* ═══════════════ 빈 상태 ═══════════════ */
  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--text3);
    font-size: 14px;
    border: 1px dashed var(--border2);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  /* ═══════════════ 토스트 ═══════════════ */
  #toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
