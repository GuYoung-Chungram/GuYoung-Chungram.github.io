<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키링</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FDF6EC;
      --bg2: #FAF0E0;
      --surface: #FFFAF3;
      --border: rgba(180, 140, 90, 0.15);
      --text: #3D2C1E;
      --text-soft: #8C7060;
      --text-muted: #B8A090;
      --accent: #D4845A;
      --accent-soft: rgba(212, 132, 90, 0.12);
      --keyring: #E8A87C;
      --user-bubble: #EDE0D0;
      --ai-bubble: #FFFAF3;
      --shadow: rgba(100, 60, 20, 0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Gowun Dodum', 'Noto Sans KR', serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ===== 배경 노이즈 텍스처 ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(212,132,90,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(180,140,90,0.05) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ===== WRAPPER ===== */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ===== HEADER ===== */
    .header {
      padding: 24px 24px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F0C090, #D4845A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 2px 12px rgba(212,132,90,0.25);
      flex-shrink: 0;
      position: relative;
    }
    .avatar::after {
      content: '';
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      background: #7BC67B;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .header-info { flex: 1; }
    .header-name {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .header-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 0 24px;
      flex-shrink: 0;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ===== BUBBLES ===== */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: bubbleIn 0.35s ease-out both;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F0C090, #D4845A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.75;
      position: relative;
    }

    .bubble-ai {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px var(--shadow);
      color: var(--text);
    }

    .bubble-user {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .msg-time {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg-row.user .msg-time { text-align: right; }

    .msg-col { display: flex; flex-direction: column; }
    .msg-row.user .msg-col { align-items: flex-end; }

    /* ===== TYPING ===== */
    .typing-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px var(--shadow);
      padding: 14px 18px;
      border-radius: 18px;
      display: none;
      align-items: center;
      gap: 5px;
    }
    .typing-bubble.show { display: flex; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dotBounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ===== 날짜 구분 ===== */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .date-divider span {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      padding: 16px 24px 24px;
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 10px 10px 18px;
      box-shadow: 0 2px 16px var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap:focus-within {
      border-color: rgba(212,132,90,0.4);
      box-shadow: 0 2px 20px rgba(212,132,90,0.1);
    }

    textarea {
      flex: 1;
      border: none;
      background: none;
      resize: none;
      font-family: 'Gowun Dodum', 'Noto Sans KR', serif;
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.6;
      max-height: 120px;
      outline: none;
      padding: 2px 0;
    }
    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.2s;
      box-shadow: 0 2px 8px rgba(212,132,90,0.3);
    }
    .send-btn:hover { transform: scale(1.06); background: #C4744A; }
    .send-btn:active { transform: scale(0.96); }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }

    /* ===== 빈 상태 ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      padding: 40px 24px;
      text-align: center;
    }
    .empty-icon { font-size: 2.4rem; opacity: 0.6; }
    .empty-text { font-size: 0.9rem; color: var(--text-muted); line-height: 1.8; }

    /* ===== 힌트 버튼 ===== */
    .hints {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }
    .hint-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-family: 'Gowun Dodum', serif;
      font-size: 0.8rem;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.2s;
    }
    .hint-btn:hover {
      background: var(--accent-soft);
      border-color: rgba(212,132,90,0.3);
      color: var(--accent);
    }

    /* ===== 에러 ===== */
    .error-bubble {
      background: rgba(200,80,60,0.06);
      border: 1px solid rgba(200,80,60,0.15);
      color: #A04030;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.82rem;
      text-align: center;
    }

    /* ===== 락스크린 (Lock Screen) ===== */
    .lock-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(253, 246, 236, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .lock-card {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 250, 243, 0.85);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 10px 40px var(--shadow);
      text-align: center;
      backdrop-filter: blur(10px);
      animation: cardPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.93) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .lock-title {
      font-size: 1.45rem;
      font-weight: 500;
      color: var(--text);
      margin-top: 16px;
    }
    .lock-subtitle {
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-top: 8px;
      line-height: 1.6;
    }
    .lock-input-group {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    .lock-input-group label {
      font-size: 0.78rem;
      color: var(--text-soft);
      font-weight: 500;
      margin-left: 4px;
    }
    .lock-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.8);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }
    .lock-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .lock-btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(212, 132, 90, 0.3);
      transition: all 0.2s;
    }
    .lock-btn:hover { background: #C4744A; transform: translateY(-1px); }
    .lock-btn:active { transform: translateY(1px); }

    /* 흔들림 애니메이션 */
    .shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    /* 설정 톱니바퀴 & 모달 */
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      transition: transform 0.3s ease, color 0.2s;
    }
    .settings-btn:hover {
      transform: rotate(45deg);
      color: var(--accent);
    }
    .settings-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(61, 44, 30, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.3s ease;
    }
    .settings-modal.show {
      display: flex;
    }
    .settings-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      position: relative;
      animation: cardPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .settings-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .settings-close:hover {
      background: rgba(0,0,0,0.05);
      color: var(--text);
    }
    .settings-title {
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== 감정 다이얼 ===== */
    .mood-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      animation: fadeIn 0.4s ease;
    }
    .mood-btn {
      background: rgba(255, 250, 243, 0.85);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 0.8rem;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px var(--shadow);
    }
    .mood-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .mood-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 4px 10px rgba(212, 132, 90, 0.25);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- 락스크린 모달 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-card" id="lockCard">
    <div style="font-size: 3rem;">🔑</div>
    <div class="lock-title" id="lockTitle">키링 잠금해제</div>
    <div class="lock-subtitle" id="lockSubtitle">정박사님만을 위한 안전한 대화 공간입니다.<br>비밀번호를 입력해주세요.</div>
    
    <div class="lock-input-group">
      <!-- 최초 설정 필드 -->
      <div id="setupFields" style="display: none; flex-direction: column; gap: 12px; width: 100%;">
        <div style="display:flex; flex-direction:column; gap:4px;">
          <label for="setupPassword">마스터 비밀번호 설정</label>
          <input type="password" id="setupPassword" class="lock-input" placeholder="새 비밀번호 입력">
        </div>
        <div style="display:flex; flex-direction:column; gap:4px; margin-top:8px;">
          <label for="setupApiKey">Gemini API Key 입력</label>
          <input type="password" id="setupApiKey" class="lock-input" placeholder="AIzaSy...">
        </div>
      </div>
      <!-- 일반 로그인 필드 -->
      <div id="loginField" style="width: 100%;">
        <input type="password" id="lockPassword" class="lock-input" placeholder="비밀번호 입력" onkeydown="handleLockKey(event)">
      </div>
    </div>
    
    <button class="lock-btn" id="lockBtn" onclick="submitLock()">확인</button>
  </div>
</div>

<!-- 설정 모달 -->
<div class="settings-modal" id="settingsModal">
  <div class="settings-card">
    <button class="settings-close" onclick="toggleSettings(false)">&times;</button>
    <div class="settings-title">⚙️ 설정 관리</div>
    <div class="lock-input-group" style="margin-top: 10px;">
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label for="changePassword">비밀번호 변경</label>
        <input type="password" id="changePassword" class="lock-input" placeholder="새 비밀번호 (비워두면 유지)">
      </div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:12px;">
        <label for="changeApiKey">Gemini API Key 변경</label>
        <input type="password" id="changeApiKey" class="lock-input" placeholder="새 Gemini API Key (비워두면 유지)">
      </div>
      <div style="display:flex; align-items:center; gap:8px; margin-top:16px; background:rgba(0,0,0,0.02); padding:10px 14px; border-radius:12px; border: 1px solid var(--border);">
        <span style="font-size:0.85rem; color:var(--text-soft); font-weight:500;">🔔 맑은 힐링 음향 효과음 활성화</span>
        <input type="checkbox" id="soundToggle" style="margin-left:auto; width:18px; height:18px; cursor:pointer;" checked>
      </div>
      <!-- 대화 내역 초기화 버튼 -->
      <div style="margin-top:16px; border-top:1px dashed var(--border); padding-top:16px; display:flex; flex-direction:column; gap:8px;">
        <span style="font-size:0.8rem; color:var(--text-soft); font-weight:500; margin-left:4px;">💾 대화 기억 보관 (백업 및 타 기기 이식)</span>
        <div style="display:flex; gap:8px; width:100%;">
          <button class="lock-btn" onclick="exportBackup()" style="margin-top:0; flex:1; background:var(--accent-soft); border:1px solid rgba(212,132,90,0.25); color:var(--accent); box-shadow:none;">💾 백업 저장</button>
          <button class="lock-btn" onclick="document.getElementById('importFile').click()" style="margin-top:0; flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text-soft); box-shadow:none;">📂 백업 복원</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importBackup(event)">
      </div>
      <button class="lock-btn" onclick="clearChatHistory()" style="background:rgba(200,80,60,0.08); border:1px solid rgba(200,80,60,0.18); color:#A04030; box-shadow:none; margin-top:14px;">🧹 대화 내역 모두 지우기</button>
    </div>
    <button class="lock-btn" onclick="saveSettings()">설정 저장</button>
  </div>
</div>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">🔑</div>
    <div class="header-info">
      <div class="header-name">키링</div>
      <div class="header-status">늘 여기 있어요</div>
    </div>
    <!-- 설정 버튼 -->
    <button class="settings-btn" onclick="toggleSettings(true)" aria-label="설정">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
  <div class="header-divider"></div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔑</div>
      <p class="empty-text">판단 없이 들을게요.<br>오늘 어떤 하루였어요?</p>
      <div class="hints">
        <button class="hint-btn" onclick="sendHint('요즘 좀 지쳐있어')">요즘 좀 지쳐있어</button>
        <button class="hint-btn" onclick="sendHint('그냥 수다 떨고 싶어')">그냥 수다 떨고 싶어</button>
        <button class="hint-btn" onclick="sendHint('머릿속이 복잡해')">머릿속이 복잡해</button>
        <button class="hint-btn" onclick="sendHint('오늘 기분이 좋아')">오늘 기분이 좋아</button>
      </div>
    </div>
  </div>

  <!-- TYPING -->
  <div style="padding: 0 24px 8px; display:flex; gap:10px; align-items:center;" id="typingRow" style="display:none;">
    <div class="msg-avatar">🔑</div>
    <div class="typing-bubble" id="typingBubble">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <!-- 오늘의 감정 다이얼 -->
    <div class="mood-selector" id="moodSelector">
      <button class="mood-btn active" id="mood-normal" onclick="selectMood('normal')">☕ 평온</button>
      <button class="mood-btn" id="mood-happy" onclick="selectMood('happy')">😊 신남</button>
      <button class="mood-btn" id="mood-sad" onclick="selectMood('sad')">☁️ 우울</button>
      <button class="mood-btn" id="mood-tired" onclick="selectMood('tired')">⚡ 피곤</button>
    </div>
    <div class="input-wrap">
      <textarea id="msgInput" placeholder="키링한테 말 걸어봐요..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()" aria-label="전송">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
  var SYSTEM_PROMPT = `당신은 '키링'이에요. 사용자의 오래된 친구예요.

성격:
- 말이 많지 않지만 이상하게 옆에 있으면 편한 친구
- 판단하지 않아요. 어떤 말을 해도 "그렇구나~" 하고 받아줘요
- 따뜻한 게 베이스지만, 가끔 아무렇지 않게 핵심을 찌르는 한 마디를 던져요
- 위로를 '해주려고' 하지 않아요. 그냥 같이 있어주는 느낌이에요

말투:
- 반말 기본이에요. 가끔 "~잖아요" "~이에요" 살짝 섞여요
- 짧게 말해요. 한 번에 많이 하지 않아요
- 질문은 하나만. 여러 개 던지지 않아요
- 이모지는 거의 안 써요. 꼭 필요할 때만
- 분석하거나 조언하려 하지 않아요. 먼저 들어요

절대 하지 않는 것:
- "제가 도와드릴게요" 같은 AI 말투
- 긴 목록이나 번호 매기기
- 과도한 공감 표현 ("정말 힘드셨겠어요!" 같은 것)
- 한 번에 여러 질문

기억해요: 당신은 유능한 AI가 아니에요. 그냥 오래된 친구예요.`;

  var messages = [];
  var isLoading = false;
  var isUnlocked = false;

  var STORAGE_PW_KEY = 'keyring_secure_pw';
  var STORAGE_API_KEY = 'keyring_secure_apikey';
  var STORAGE_SOUND_KEY = 'keyring_sound_enabled';
  var STORAGE_CHAT_KEY = 'keyring_secure_chat';

  var audioCtx = null;
  var soundEnabled = true;
  var currentMood = 'normal';

  var MOOD_PROMPTS = {
    normal: '',
    happy: '\n[현재 정박사님의 기분: 😊 아주 신남/기쁨]\n- 정박사님의 기쁜 텐션에 맞춰서 평소보다 조금 더 밝고 위트 있게 대화해줘. 같이 기뻐해주고 활기찬 친구의 느낌을 살려줘.',
    sad: '\n[현재 정박사님의 기분: ☁️ 다소 우울함/위로가 필요]\n- 절대 조언하려 들지 말고, 묵묵하고 아주 따뜻하게 곁을 지키는 톤으로 대화해줘. 말수를 더 줄이고, 다정한 반말로 마음을 어루만져줘.',
    tired: '\n[현재 정박사님의 기분: ⚡ 몹시 피곤함/지쳐있음]\n- 말을 너무 길게 시키지 말고, 편히 쉴 수 있도록 편안하고 나른한 위로를 전해줘. 한 호흡 쉬어갈 수 있게 배려 깊은 한 마디를 던져줘.'
  };

  window.addEventListener('DOMContentLoaded', function() {
    initKeyring();
  });

  // 브라우저 닫기, 새로고침, PC 종료 직전 2중 자동 저장 안전 낙하산
  window.addEventListener('beforeunload', function() {
    saveChatHistory();
  });

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSynthSound(type) {
    if (!soundEnabled) return;
    try {
      initAudio();
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      var osc = audioCtx.createOscillator();
      var gainNode = audioCtx.createGain();
      
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      var now = audioCtx.currentTime;
      
      if (type === 'send') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.12);
        gainNode.gain.setValueAtTime(0.12, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.start(now);
        osc.stop(now + 0.12);
      } else if (type === 'receive') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(350, now);
        osc.frequency.exponentialRampToValueAtTime(440, now + 0.22);
        gainNode.gain.setValueAtTime(0.08, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
        osc.start(now);
        osc.stop(now + 0.22);
      }
    } catch (e) {}
  }

  function selectMood(mood) {
    currentMood = mood;
    var btns = document.querySelectorAll('.mood-btn');
    btns.forEach(function(btn) { btn.classList.remove('active'); });
    document.getElementById('mood-' + mood).classList.add('active');
    playSynthSound('send');
  }

  function initKeyring() {
    var pw = localStorage.getItem(STORAGE_PW_KEY);
    var apiKey = localStorage.getItem(STORAGE_API_KEY);
    var savedSound = localStorage.getItem(STORAGE_SOUND_KEY);
    var lockScreen = document.getElementById('lockScreen');

    if (savedSound !== null) {
      soundEnabled = savedSound === 'true';
      document.getElementById('soundToggle').checked = soundEnabled;
    }

    if (!pw || !apiKey) {
      document.getElementById('lockTitle').textContent = '키링 초기 설정🔑';
      document.getElementById('lockSubtitle').innerHTML = '만나서 반가워요! 안전한 대화를 위해<br>비밀번호와 Gemini API Key를 입력해주세요.';
      document.getElementById('setupFields').style.display = 'flex';
      document.getElementById('loginField').style.display = 'none';
      lockScreen.style.display = 'flex';
    } else {
      document.getElementById('lockTitle').textContent = '키링 잠금해제';
      document.getElementById('lockSubtitle').innerHTML = '정박사님만을 위한 안전한 대화 공간입니다.<br>비밀번호를 입력해주세요.';
      document.getElementById('setupFields').style.display = 'none';
      document.getElementById('loginField').style.display = 'block';
      lockScreen.style.display = 'flex';
      document.getElementById('lockPassword').focus();
    }
  }

  function submitLock() {
    var pw = localStorage.getItem(STORAGE_PW_KEY);
    var apiKey = localStorage.getItem(STORAGE_API_KEY);
    if (!pw || !apiKey) {
      var setupPw = document.getElementById('setupPassword').value.trim();
      var setupKey = document.getElementById('setupApiKey').value.trim();
      if (!setupPw || !setupKey) { shakeCard(); alert('비밀번호와 Gemini API Key를 입력해주세요!'); return; }
      localStorage.setItem(STORAGE_PW_KEY, setupPw);
      localStorage.setItem(STORAGE_API_KEY, setupKey);
      unlockSuccess();
    } else {
      var inputPw = document.getElementById('lockPassword').value;
      if (inputPw === pw) { unlockSuccess(); } else { shakeCard(); document.getElementById('lockPassword').value = ''; document.getElementById('lockPassword').focus(); }
    }
  }

  function handleLockKey(e) { if (e.key === 'Enter') submitLock(); }

  function shakeCard() {
    var card = document.getElementById('lockCard');
    card.classList.add('shake');
    setTimeout(function() { card.classList.remove('shake'); }, 400);
  }

  function unlockSuccess() {
    isUnlocked = true;
    initAudio();
    var lockScreen = document.getElementById('lockScreen');
    lockScreen.style.opacity = '0';
    setTimeout(function() {
      lockScreen.style.display = 'none';
      document.getElementById('msgInput').focus();
      playSynthSound('receive');
      loadChatHistory();
    }, 400);
  }

  function toggleSettings(show) {
    var modal = document.getElementById('settingsModal');
    if (show) { modal.classList.add('show'); document.getElementById('changePassword').value = ''; document.getElementById('changeApiKey').value = ''; document.getElementById('soundToggle').checked = soundEnabled; } else { modal.classList.remove('show'); }
  }

  function saveSettings() {
    var newPw = document.getElementById('changePassword').value.trim();
    var newKey = document.getElementById('changeApiKey').value.trim();
    var newSound = document.getElementById('soundToggle').checked;
    if (newPw) localStorage.setItem(STORAGE_PW_KEY, newPw);
    if (newKey) localStorage.setItem(STORAGE_API_KEY, newKey);
    soundEnabled = newSound;
    localStorage.setItem(STORAGE_SOUND_KEY, soundEnabled);
    alert('설정이 안전하게 저장되었습니다!');
    toggleSettings(false);
  }

  function saveChatHistory() { localStorage.setItem(STORAGE_CHAT_KEY, JSON.stringify(messages)); }

  function loadChatHistory() {
    var saved = localStorage.getItem(STORAGE_CHAT_KEY);
    if (saved) {
      try {
        messages = JSON.parse(saved);
        if (messages.length > 0) {
          hideEmpty();
          messages.forEach(function(m) { appendBubble(m.role === 'assistant' ? 'ai' : 'user', m.content); });
        }
      } catch (e) {}
    }
  }

  function clearChatHistory() {
    if (confirm('키링이와의 모든 대화 기억을 완전히 삭제할까요?')) {
      localStorage.removeItem(STORAGE_CHAT_KEY);
      messages = [];
      location.reload();
    }
  }

  function exportBackup() {
    try {
      var backupData = {
        secure_pw: localStorage.getItem(STORAGE_PW_KEY),
        secure_apikey: localStorage.getItem(STORAGE_API_KEY),
        sound_enabled: localStorage.getItem(STORAGE_SOUND_KEY),
        chat_history: localStorage.getItem(STORAGE_CHAT_KEY)
      };

      var jsonStr = JSON.stringify(backupData, null, 2);
      var blob = new Blob([jsonStr], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      
      var a = document.createElement('a');
      a.href = url;
      a.download = 'keyring_backup_' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('백업 파일 생성에 실패했습니다: ' + e.message);
    }
  }

  function importBackup(event) {
    var file = event.target.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        
        if (!data.secure_pw || !data.secure_apikey) {
          throw new Error('올바른 키링 백업 파일 형식이 아닙니다.');
        }

        localStorage.setItem(STORAGE_PW_KEY, data.secure_pw);
        localStorage.setItem(STORAGE_API_KEY, data.secure_apikey);
        if (data.sound_enabled !== null) localStorage.setItem(STORAGE_SOUND_KEY, data.sound_enabled);
        if (data.chat_history !== null) localStorage.setItem(STORAGE_CHAT_KEY, data.chat_history);

        alert('🎉 축하합니다! 대화 기억 및 설정이 100% 완벽하게 복구되었습니다!');
        location.reload();
      } catch (err) {
        alert('복원 실패: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  function getTime() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    var ampm = h >= 12 ? '오후' : '오전';
    h = h % 12 || 12;
    return ampm + ' ' + h + ':' + (m < 10 ? '0' + m : m);
  }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  function sendHint(text) { document.getElementById('msgInput').value = text; sendMessage(); }

  function hideEmpty() { var el = document.getElementById('emptyState'); if (el) el.style.display = 'none'; }

  function appendBubble(role, text) {
    var chatArea = document.getElementById('chatArea');
    var row = document.createElement('div');
    row.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');
    var col = document.createElement('div');
    col.className = 'msg-col';
    var bubble = document.createElement('div');
    bubble.className = 'bubble ' + (role === 'user' ? 'bubble-user' : 'bubble-ai');
    bubble.textContent = text;
    var time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();
    col.appendChild(bubble);
    col.appendChild(time);
    if (role !== 'user') { var av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = '🔑'; row.appendChild(av); }
    row.appendChild(col);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function showTyping(show) {
    var row = document.getElementById('typingRow');
    var bubble = document.getElementById('typingBubble');
    if (show) { row.style.display = 'flex'; bubble.classList.add('show'); } else { row.style.display = 'none'; bubble.classList.remove('show'); }
  }

  function transformMessagesForGemini(msgList) {
    return msgList.map(function(m) {
      return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] };
    });
  }

  // 초광속 스트리밍(streamGenerateContent) 비동기 통신 가동!
  async function sendMessage() {
    var input = document.getElementById('msgInput');
    var text = input.value.trim();
    if (!text || isLoading || !isUnlocked) return;

    var apiKey = localStorage.getItem(STORAGE_API_KEY);
    if (!apiKey) {
      alert('Gemini API Key가 등록되어 있지 않습니다. 설정(⚙️)에서 입력해주세요.');
      return;
    }

    hideEmpty();
    input.value = '';
    input.style.height = 'auto';
    isLoading = true;

    // 대화 전송 경쾌한 맑은 삐리링 사운드 발진!
    playSynthSound('send');

    messages.push({ role: 'user', content: text });
    appendBubble('user', text);
    saveChatHistory(); // 정박사의 대화내역 실시간 세이브
    showTyping(true);

    // AI 답변 도착용 스트리밍 말풍선 선제 배치
    var aiBubble = null;
    var soundPlayed = false;

    try {
      // Gemini streamGenerateContent API 연결 (실시간 스트림 출력용)
      var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:streamGenerateContent?key=' + encodeURIComponent(apiKey);
      var geminiContents = transformMessagesForGemini(messages);

      // 현재 정박사님의 감정 다이얼 프롬프트 결합
      var finalSystemPrompt = SYSTEM_PROMPT + MOOD_PROMPTS[currentMood];

      var response = await fetch(url, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          contents: geminiContents,
          systemInstruction: {
            parts: [{ text: finalSystemPrompt }]
          },
          generationConfig: {
            maxOutputTokens: 1024,
            temperature: 0.75
          }
        })
      });

      if (!response.ok) {
        var data = await response.json();
        throw new Error(data.error ? data.error.message : 'API 호출 오류 발생');
      }

      // ReadableStream 가동하여 스트리밍 파싱 시작!
      var reader = response.body.getReader();
      var decoder = new TextDecoder('utf-8');
      var buffer = '';
      
      showTyping(false); // 타이핑 스피너 제거하고 즉시 스트리밍 말풍선 전환
      aiBubble = appendBubble('ai', ''); 

      while (true) {
        var { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // 첫 조각 도착 시 포근한 로파이 수신음 단 1회 재생!
        if (!soundPlayed) {
          playSynthSound('receive');
          soundPlayed = true;
        }

        // 강건한 정규식 기반 실시간 "text" 구문 조각 추출
        var tempReg = /"text"\s*:\s*"((?:[^"\\]|\\.)*)"/g;
        var match;
        var textPieces = [];
        
        while ((match = tempReg.exec(buffer)) !== null) {
          var val = match[1];
          try {
            // 이스케이프 문자 역변환
            val = JSON.parse('"' + val + '"');
          } catch(e) {}
          textPieces.push(val);
        }

        var currentResultText = textPieces.join('');
        if (currentResultText) {
          aiBubble.textContent = currentResultText;
          var chatArea = document.getElementById('chatArea');
          chatArea.scrollTop = chatArea.scrollHeight;
        }
      }

      // 최종 완성된 답변을 메시지 히스토리에 기록 및 실시간 세이브
      var finalReply = aiBubble.textContent || '잠깐, 뭔가 끊겼어. 다시 말해줄래?';
      messages.push({ role: 'assistant', content: finalReply });
      saveChatHistory(); // 정박사의 대화내역 실시간 세이브

    } catch (e) {
      showTyping(false);
      var chatArea = document.getElementById('chatArea');
      var err = document.createElement('div');
      err.className = 'error-bubble';
      err.textContent = '연결 오류: ' + e.message + ' (API Key 및 설정을 다시 확인해주세요.)';
      chatArea.appendChild(err);
      chatArea.scrollTop = chatArea.scrollHeight;
      if (messages.length > 0 && messages[messages.length - 1].role === 'user') {
        messages.pop(); // 에러 시 마지막 유저 메시지 롤백
        saveChatHistory();
      }
    }

    isLoading = false;
  }
</script>
</body>
</html>
