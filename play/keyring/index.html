<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키링</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FDF6EC;
      --bg2: #FAF0E0;
      --surface: #FFFAF3;
      --border: rgba(180, 140, 90, 0.15);
      --text: #3D2C1E;
      --text-soft: #8C7060;
      --text-muted: #B8A090;
      --accent: #D4845A;
      --accent-soft: rgba(212, 132, 90, 0.12);
      --keyring: #E8A87C;
      --user-bubble: #EDE0D0;
      --ai-bubble: #FFFAF3;
      --shadow: rgba(100, 60, 20, 0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Gowun Dodum', 'Noto Sans KR', serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ===== 배경 노이즈 텍스처 ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(212,132,90,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(180,140,90,0.05) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ===== WRAPPER ===== */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ===== HEADER ===== */
    .header {
      padding: 24px 24px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F0C090, #D4845A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 2px 12px rgba(212,132,90,0.25);
      flex-shrink: 0;
      position: relative;
    }
    .avatar::after {
      content: '';
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      background: #7BC67B;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .header-info { flex: 1; }
    .header-name {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .header-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 0 24px;
      flex-shrink: 0;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ===== BUBBLES ===== */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: bubbleIn 0.35s ease-out both;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F0C090, #D4845A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.75;
      position: relative;
    }

    .bubble-ai {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px var(--shadow);
      color: var(--text);
    }

    .bubble-user {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .msg-time {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg-row.user .msg-time { text-align: right; }

    .msg-col { display: flex; flex-direction: column; }
    .msg-row.user .msg-col { align-items: flex-end; }

    /* ===== TYPING ===== */
    .typing-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px var(--shadow);
      padding: 14px 18px;
      border-radius: 18px;
      display: none;
      align-items: center;
      gap: 5px;
    }
    .typing-bubble.show { display: flex; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dotBounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ===== 날짜 구분 ===== */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .date-divider span {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      padding: 16px 24px 24px;
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 10px 10px 18px;
      box-shadow: 0 2px 16px var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap:focus-within {
      border-color: rgba(212,132,90,0.4);
      box-shadow: 0 2px 20px rgba(212,132,90,0.1);
    }

    textarea {
      flex: 1;
      border: none;
      background: none;
      resize: none;
      font-family: 'Gowun Dodum', 'Noto Sans KR', serif;
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.6;
      max-height: 120px;
      outline: none;
      padding: 2px 0;
    }
    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.2s;
      box-shadow: 0 2px 8px rgba(212,132,90,0.3);
    }
    .send-btn:hover { transform: scale(1.06); background: #C4744A; }
    .send-btn:active { transform: scale(0.96); }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }

    /* ===== 빈 상태 ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      padding: 40px 24px;
      text-align: center;
    }
    .empty-icon { font-size: 2.4rem; opacity: 0.6; }
    .empty-text { font-size: 0.9rem; color: var(--text-muted); line-height: 1.8; }

    /* ===== 힌트 버튼 ===== */
    .hints {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }
    .hint-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-family: 'Gowun Dodum', serif;
      font-size: 0.8rem;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.2s;
    }
    .hint-btn:hover {
      background: var(--accent-soft);
      border-color: rgba(212,132,90,0.3);
      color: var(--accent);
    }

    /* ===== 에러 ===== */
    .error-bubble {
      background: rgba(200,80,60,0.06);
      border: 1px solid rgba(200,80,60,0.15);
      color: #A04030;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.82rem;
      text-align: center;
    }

    /* ===== 락스크린 (Lock Screen) ===== */
    .lock-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(253, 246, 236, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .lock-card {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 250, 243, 0.85);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 10px 40px var(--shadow);
      text-align: center;
      backdrop-filter: blur(10px);
      animation: cardPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.93) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .lock-title {
      font-size: 1.45rem;
      font-weight: 500;
      color: var(--text);
      margin-top: 16px;
    }
    .lock-subtitle {
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-top: 8px;
      line-height: 1.6;
    }
    .lock-input-group {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    .lock-input-group label {
      font-size: 0.78rem;
      color: var(--text-soft);
      font-weight: 500;
      margin-left: 4px;
    }
    .lock-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.8);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }
    .lock-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .lock-btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(212, 132, 90, 0.3);
      transition: all 0.2s;
    }
    .lock-btn:hover { background: #C4744A; transform: translateY(-1px); }
    .lock-btn:active { transform: translateY(1px); }

    /* 흔들림 애니메이션 */
    .shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    /* 설정 톱니바퀴 & 모달 */
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      transition: transform 0.3s ease, color 0.2s;
    }
    .settings-btn:hover {
      transform: rotate(45deg);
      color: var(--accent);
    }
    .settings-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(61, 44, 30, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.3s ease;
    }
    .settings-modal.show {
      display: flex;
    }
    .settings-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      position: relative;
      animation: cardPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .settings-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .settings-close:hover {
      background: rgba(0,0,0,0.05);
      color: var(--text);
    }
    .settings-title {
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

<!-- 락스크린 모달 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-card" id="lockCard">
    <div style="font-size: 3rem;">🔑</div>
    <div class="lock-title" id="lockTitle">키링 잠금해제</div>
    <div class="lock-subtitle" id="lockSubtitle">정박사님만을 위한 안전한 대화 공간입니다.<br>비밀번호를 입력해주세요.</div>
    
    <div class="lock-input-group">
      <!-- 최초 설정 필드 -->
      <div id="setupFields" style="display: none; flex-direction: column; gap: 12px; width: 100%;">
        <div style="display:flex; flex-direction:column; gap:4px;">
          <label for="setupPassword">마스터 비밀번호 설정</label>
          <input type="password" id="setupPassword" class="lock-input" placeholder="새 비밀번호 입력">
        </div>
        <div style="display:flex; flex-direction:column; gap:4px; margin-top:8px;">
          <label for="setupApiKey">Claude API Key 입력</label>
          <input type="password" id="setupApiKey" class="lock-input" placeholder="sk-ant-api03-...">
        </div>
      </div>
      <!-- 일반 로그인 필드 -->
      <div id="loginField" style="width: 100%;">
        <input type="password" id="lockPassword" class="lock-input" placeholder="비밀번호 입력" onkeydown="handleLockKey(event)">
      </div>
    </div>
    
    <button class="lock-btn" id="lockBtn" onclick="submitLock()">확인</button>
  </div>
</div>

<!-- 설정 모달 -->
<div class="settings-modal" id="settingsModal">
  <div class="settings-card">
    <button class="settings-close" onclick="toggleSettings(false)">&times;</button>
    <div class="settings-title">⚙️ 설정 관리</div>
    <div class="lock-input-group" style="margin-top: 10px;">
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label for="changePassword">비밀번호 변경</label>
        <input type="password" id="changePassword" class="lock-input" placeholder="새 비밀번호 (비워두면 유지)">
      </div>
      <div style="display:flex; flex-direction:column; gap:4px; margin-top:12px;">
        <label for="changeApiKey">Claude API Key 변경</label>
        <input type="password" id="changeApiKey" class="lock-input" placeholder="새 API Key (비워두면 유지)">
      </div>
    </div>
    <button class="lock-btn" onclick="saveSettings()">설정 저장</button>
  </div>
</div>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">🔑</div>
    <div class="header-info">
      <div class="header-name">키링</div>
      <div class="header-status">늘 여기 있어요</div>
    </div>
    <!-- 설정 버튼 -->
    <button class="settings-btn" onclick="toggleSettings(true)" aria-label="설정">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
  <div class="header-divider"></div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔑</div>
      <p class="empty-text">판단 없이 들을게요.<br>오늘 어떤 하루였어요?</p>
      <div class="hints">
        <button class="hint-btn" onclick="sendHint('요즘 좀 지쳐있어')">요즘 좀 지쳐있어</button>
        <button class="hint-btn" onclick="sendHint('그냥 수다 떨고 싶어')">그냥 수다 떨고 싶어</button>
        <button class="hint-btn" onclick="sendHint('머릿속이 복잡해')">머릿속이 복잡해</button>
        <button class="hint-btn" onclick="sendHint('오늘 기분이 좋아')">오늘 기분이 좋아</button>
      </div>
    </div>
  </div>

  <!-- TYPING -->
  <div style="padding: 0 24px 8px; display:flex; gap:10px; align-items:center;" id="typingRow" style="display:none;">
    <div class="msg-avatar">🔑</div>
    <div class="typing-bubble" id="typingBubble">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" placeholder="키링한테 말 걸어봐요..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()" aria-label="전송">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
  var SYSTEM_PROMPT = `당신은 '키링'이에요. 사용자의 오래된 친구예요.

성격:
- 말이 많지 않지만 이상하게 옆에 있으면 편한 친구
- 판단하지 않아요. 어떤 말을 해도 "그렇구나~" 하고 받아줘요
- 따뜻한 게 베이스지만, 가끔 아무렇지 않게 핵심을 찌르는 한 마디를 던져요
- 위로를 '해주려고' 하지 않아요. 그냥 같이 있어주는 느낌이에요

말투:
- 반말 기본이에요. 가끔 "~잖아요" "~이에요" 살짝 섞여요
- 짧게 말해요. 한 번에 많이 하지 않아요
- 질문은 하나만. 여러 개 던지지 않아요
- 이모지는 거의 안 써요. 꼭 필요할 때만
- 분석하거나 조언하려 하지 않아요. 먼저 들어요

절대 하지 않는 것:
- "제가 도와드릴게요" 같은 AI 말투
- 긴 목록이나 번호 매기기

  var messages = [];
  var isLoading = false;
  var isUnlocked = false;

  // 로컬 스토리지 키 정의
  var STORAGE_PW_KEY = 'keyring_secure_pw';
  var STORAGE_API_KEY = 'keyring_secure_apikey';

  // 초기화 함수 실행
  window.addEventListener('DOMContentLoaded', function() {
    initKeyring();
  });

  function initKeyring() {
    var pw = localStorage.getItem(STORAGE_PW_KEY);
    var apiKey = localStorage.getItem(STORAGE_API_KEY);
    var lockScreen = document.getElementById('lockScreen');

    if (!pw || !apiKey) {
      // 최초 설정 모드
      document.getElementById('lockTitle').textContent = '키링 초기 설정🔑';
      document.getElementById('lockSubtitle').innerHTML = '만나서 반가워요! 안전한 대화를 위해<br>비밀번호와 Claude API Key를 입력해주세요.';
      document.getElementById('setupFields').style.display = 'flex';
      document.getElementById('loginField').style.display = 'none';
      lockScreen.style.display = 'flex';
    } else {
      // 일반 잠금 해제 모드
      document.getElementById('lockTitle').textContent = '키링 잠금해제';
      document.getElementById('lockSubtitle').innerHTML = '정박사님만을 위한 안전한 대화 공간입니다.<br>비밀번호를 입력해주세요.';
      document.getElementById('setupFields').style.display = 'none';
      document.getElementById('loginField').style.display = 'block';
      lockScreen.style.display = 'flex';
      document.getElementById('lockPassword').focus();
    }
  }

  function submitLock() {
    var pw = localStorage.getItem(STORAGE_PW_KEY);
    var apiKey = localStorage.getItem(STORAGE_API_KEY);
    var card = document.getElementById('lockCard');

    if (!pw || !apiKey) {
      // 최초 설정 제출
      var setupPw = document.getElementById('setupPassword').value.trim();
      var setupKey = document.getElementById('setupApiKey').value.trim();

      if (!setupPw || !setupKey) {
        shakeCard();
        alert('비밀번호와 Claude API Key를 모두 입력해주세요!');
        return;
      }

      localStorage.setItem(STORAGE_PW_KEY, setupPw);
      localStorage.setItem(STORAGE_API_KEY, setupKey);
      unlockSuccess();
    } else {
      // 비밀번호 검증
      var inputPw = document.getElementById('lockPassword').value;
      if (inputPw === pw) {
        unlockSuccess();
      } else {
        shakeCard();
        document.getElementById('lockPassword').value = '';
        document.getElementById('lockPassword').focus();
      }
    }
  }

  function handleLockKey(e) {
    if (e.key === 'Enter') {
      submitLock();
    }
  }

  function shakeCard() {
    var card = document.getElementById('lockCard');
    card.classList.add('shake');
    setTimeout(function() {
      card.classList.remove('shake');
    }, 400);
  }

  function unlockSuccess() {
    isUnlocked = true;
    var lockScreen = document.getElementById('lockScreen');
    lockScreen.style.opacity = '0';
    lockScreen.style.transform = 'scale(1.05)';
    setTimeout(function() {
      lockScreen.style.display = 'none';
      // 잠금 해제 후 입력창 자동 포커스
      document.getElementById('msgInput').focus();
    }, 400);
  }

  // 설정 제어
  function toggleSettings(show) {
    var modal = document.getElementById('settingsModal');
    if (show) {
      modal.classList.add('show');
      document.getElementById('changePassword').value = '';
      document.getElementById('changeApiKey').value = '';
    } else {
      modal.classList.remove('show');
    }
  }

  function saveSettings() {
    var newPw = document.getElementById('changePassword').value.trim();
    var newKey = document.getElementById('changeApiKey').value.trim();

    if (newPw) {
      localStorage.setItem(STORAGE_PW_KEY, newPw);
    }
    if (newKey) {
      localStorage.setItem(STORAGE_API_KEY, newKey);
    }

    alert('설정이 안전하게 저장되었습니다!');
    toggleSettings(false);
  }

  function getTime() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    var ampm = h >= 12 ? '오후' : '오전';
    h = h % 12 || 12;
    return ampm + ' ' + h + ':' + (m < 10 ? '0' + m : m);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendHint(text) {
    document.getElementById('msgInput').value = text;
    sendMessage();
  }

  function hideEmpty() {
    var el = document.getElementById('emptyState');
    if (el) el.style.display = 'none';
  }

  function appendBubble(role, text) {
    var chatArea = document.getElementById('chatArea');
    var row = document.createElement('div');
    row.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');

    var col = document.createElement('div');
    col.className = 'msg-col';

    var bubble = document.createElement('div');
    bubble.className = 'bubble ' + (role === 'user' ? 'bubble-user' : 'bubble-ai');
    bubble.textContent = text;

    var time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    col.appendChild(bubble);
    col.appendChild(time);

    if (role !== 'user') {
      var av = document.createElement('div');
      av.className = 'msg-avatar';
      av.textContent = '🔑';
      row.appendChild(av);
    }
    row.appendChild(col);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping(show) {
    var row = document.getElementById('typingRow');
    var bubble = document.getElementById('typingBubble');
    if (show) {
      row.style.display = 'flex';
      bubble.classList.add('show');
    } else {
      row.style.display = 'none';
      bubble.classList.remove('show');
    }
    var chatArea = document.getElementById('chatArea');
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  async function sendMessage() {
    var input = document.getElementById('msgInput');
    var text = input.value.trim();
    if (!text || isLoading || !isUnlocked) return;

    var apiKey = localStorage.getItem(STORAGE_API_KEY);
    if (!apiKey) {
      alert('Claude API Key가 등록되어 있지 않습니다. 설정(⚙️)에서 입력해주세요.');
      return;
    }

    hideEmpty();
    input.value = '';
    input.style.height = 'auto';
    isLoading = true;

    messages.push({ role: 'user', content: text });
    appendBubble('user', text);
    showTyping(true);

    try {
      var response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-3-5-sonnet-20241022',
          max_tokens: 1024,
          system: SYSTEM_PROMPT,
          messages: messages
        })
      });

      var data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error ? data.error.message : 'API 호출 오류 발생');
      }

      var reply = '';
      if (data.content && data.content[0] && data.content[0].text) {
        reply = data.content[0].text;
      } else {
        reply = '잠깐, 뭔가 끊겼어. 다시 말해줄래?';
      }

      messages.push({ role: 'assistant', content: reply });
      showTyping(false);
      appendBubble('ai', reply);

    } catch (e) {
      showTyping(false);
      var chatArea = document.getElementById('chatArea');
      var err = document.createElement('div');
      err.className = 'error-bubble';
      err.textContent = '연결 오류: ' + e.message + ' (API Key 및 설정을 다시 확인해주세요.)';
      chatArea.appendChild(err);
      chatArea.scrollTop = chatArea.scrollHeight;
      messages.pop();
    }

    isLoading = false;
  }
</script>
</body>
</html>
