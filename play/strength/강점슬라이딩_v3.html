<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 강점 슬라이딩</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --w1:#ff9a56;--w2:#ffb347;--w3:#ff6b9d;--glow:#ffd700;
    --bg:#0d0d1a;--card:rgba(255,255,255,0.04);--border:rgba(255,180,100,0.25);
    --text:#fff3e8;--dim:rgba(255,243,232,0.5);
    --feel:#f472b6;--think:#60a5fa;--do:#4ade80;
    --red:#f87171;--green:#4ade80;--yellow:#fbbf24;--purple:#a78bfa;
  }
  body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse at 20% 20%,rgba(255,154,86,.07) 0%,transparent 55%),
               radial-gradient(ellipse at 80% 75%,rgba(255,107,157,.07) 0%,transparent 55%);}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur,3s) ease-in-out infinite;opacity:0;}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--op,.7);transform:scale(1)}}
  @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
  @keyframes pFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

  /* ── 공통 ── */
  .screen{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column;align-items:center;padding:28px 16px 60px;isolation:auto;}
  .screen.active{display:flex;}
  .logo{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;letter-spacing:5px;color:var(--w2);margin-bottom:6px;filter:drop-shadow(0 0 10px rgba(255,180,71,.4));text-align:center;}
  .sub{color:var(--dim);font-size:.83rem;letter-spacing:1px;text-align:center;}
  .card-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 26px;width:100%;max-width:560px;backdrop-filter:blur(12px);}
  .card-box+.card-box{margin-top:14px;}
  .card-ttl{font-size:.7rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--w2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .card-ttl::before{content:'';display:inline-block;width:14px;height:2px;background:linear-gradient(90deg,var(--w1),var(--w2));border-radius:2px;}
  input[type=text]{width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,154,86,.2);border-radius:12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.92rem;padding:11px 15px;outline:none;transition:border-color .2s,box-shadow .2s;}
  input[type=text]:focus{border-color:var(--w1);box-shadow:0 0 14px rgba(255,154,86,.2);}
  input[type=text]::placeholder{color:rgba(255,243,232,.25);}
  .btn{padding:12px 32px;font-family:'Orbitron',monospace;font-size:.82rem;font-weight:700;letter-spacing:2px;color:#fff;background:linear-gradient(135deg,var(--w1),var(--w3));border:none;border-radius:50px;cursor:pointer;transition:all .25s;box-shadow:0 6px 28px rgba(255,107,157,.35);}
  .btn:hover{transform:translateY(-2px) scale(1.03);}
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);box-shadow:none;font-family:'Noto Sans KR',sans-serif;font-size:.8rem;letter-spacing:0;padding:9px 18px;}
  .btn-ghost:hover{border-color:var(--w2);color:var(--w2);background:rgba(255,180,71,.08);}
  .btn-teal{background:linear-gradient(135deg,#0d9488,#0891b2);}
  .btn-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);}
  .room-code{font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:900;color:var(--w1);letter-spacing:6px;text-align:center;filter:drop-shadow(0 0 14px rgba(255,154,86,.5));margin:8px 0;}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:500;}
  .badge-g{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--green);}
  .badge-y{background:rgba(255,180,71,.12);border:1px solid rgba(255,180,71,.3);color:var(--w2);}
  .badge-r{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red);}
  .badge-p{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:var(--purple);}
  .badge-feel{background:rgba(244,114,182,.12);border:1px solid rgba(244,114,182,.3);color:var(--feel);}
  .badge-think{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.3);color:var(--think);}
  .badge-do{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--do);}

  /* ── 강점카드 그리드 ── */
  .cards-grid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
  .str-card{
    width:86px;height:86px;border-radius:14px;
    border:1.5px solid rgba(255,180,100,.15);
    background:rgba(255,255,255,.04);
    color:var(--dim);font-size:.68rem;font-weight:500;
    cursor:pointer;transition:all .18s;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;text-align:center;padding:6px;position:relative;overflow:visible;
    line-height:1.3;
  }
  .str-card .ce{font-size:1.25rem;}
  .str-card .cn{font-size:.68rem;line-height:1.2;}
  .str-card .ccat{font-size:.55rem;opacity:.5;margin-top:1px;}
  .str-card:hover:not(.disabled):not(.passed){
    border-color:rgba(255,154,86,.5);color:var(--text);
    transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,154,86,.2);
  }
  .str-card.kept{border-color:var(--glow);color:#fff;box-shadow:0 0 20px rgba(255,215,0,.4);}
  .str-card.kept::before{content:'';position:absolute;inset:0;background:rgba(255,215,0,.08);border-radius:12px;}
  .str-card.kept::after{content:'✦';position:absolute;top:3px;right:5px;font-size:.58rem;color:var(--glow);}
  .str-card.passed{opacity:.2;cursor:default;pointer-events:none;}
  .str-card.disabled{opacity:.4;cursor:default;pointer-events:none;}
  .str-card.feel-card{border-color:rgba(244,114,182,.2);}
  .str-card.think-card{border-color:rgba(96,165,250,.2);}
  .str-card.do-card{border-color:rgba(74,222,128,.2);}
  .str-card.kept.feel-card{border-color:var(--feel);box-shadow:0 0 18px rgba(244,114,182,.4);}
  .str-card.kept.think-card{border-color:var(--think);box-shadow:0 0 18px rgba(96,165,250,.4);}
  .str-card.kept.do-card{border-color:var(--do);box-shadow:0 0 18px rgba(74,222,128,.4);}

  /* 툴팁 */
  .str-card .tooltip{
    position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
    background:rgba(13,13,26,.97);border:1px solid var(--border);
    border-radius:10px;padding:8px 12px;width:180px;
    font-size:.72rem;color:var(--text);line-height:1.5;
    pointer-events:none;opacity:0;transition:opacity .15s;
    z-index:100;text-align:left;font-weight:400;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
    white-space:normal;
  }
  .str-card:hover .tooltip{opacity:1;}
  .str-card .tooltip .tt-name{font-weight:700;color:var(--w2);margin-bottom:3px;font-size:.75rem;}

  /* ── 플레이어 행 ── */
  .player-row{display:flex;align-items:center;gap:10px;padding:9px 13px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.05);margin-bottom:6px;}
  .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;}
  .player-name{flex:1;font-size:.86rem;font-weight:500;}

  /* ── 킵 카드 누적 표시 ── */
  .kept-bar{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .kept-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;font-size:.72rem;font-weight:500;}
  .kept-chip.feel{background:rgba(244,114,182,.12);border:1px solid rgba(244,114,182,.3);color:var(--feel);}
  .kept-chip.think{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.3);color:var(--think);}
  .kept-chip.do{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--do);}

  /* ── 라운드 배너 ── */
  .round-banner{text-align:center;margin-bottom:18px;}
  .round-num{font-family:'Orbitron',monospace;font-size:.9rem;color:var(--w2);letter-spacing:4px;margin-bottom:3px;}
  .round-desc{font-size:.83rem;color:var(--dim);line-height:1.6;}

  /* ── 동시공개 오버레이 ── */
  .overlay{position:fixed;inset:0;background:rgba(13,13,26,.95);backdrop-filter:blur(8px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;}
  .overlay.active{display:flex;}
  .countdown-big{font-family:'Orbitron',monospace;font-size:7rem;font-weight:900;background:linear-gradient(135deg,var(--w1),var(--glow),var(--w3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,154,86,.7));animation:cPop .9s ease-out forwards;}
  @keyframes cPop{0%{transform:scale(2);opacity:0}40%{transform:scale(.9);opacity:1}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:.3}}
  .reveal-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:720px;}
  .reveal-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;text-align:center;min-width:110px;}
  .reveal-item .rn{font-size:.72rem;color:var(--dim);margin-bottom:6px;}
  .reveal-item .re{font-size:1.5rem;margin-bottom:3px;}
  .reveal-item .rc{font-size:.88rem;font-weight:700;color:var(--text);}

  /* ── 결과 화면 ── */
  .result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 26px;width:100%;max-width:560px;}
  .domain-bar{display:flex;gap:8px;margin-bottom:16px;}
  .domain-badge{flex:1;padding:10px 8px;border-radius:12px;text-align:center;}
  .domain-badge .db-num{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;}
  .domain-badge .db-lbl{font-size:.68rem;margin-top:2px;opacity:.8;}
  .db-feel{background:rgba(244,114,182,.12);border:1px solid rgba(244,114,182,.25);color:var(--feel);}
  .db-think{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25);color:var(--think);}
  .db-do{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);color:var(--do);}

  .scrollable{max-height:55vh;overflow-y:auto;padding-right:4px;}
  .scrollable::-webkit-scrollbar{width:4px;}
  .scrollable::-webkit-scrollbar-thumb{background:rgba(255,154,86,.3);border-radius:2px;}

  .top-btns{position:fixed;top:14px;right:14px;z-index:100;display:flex;gap:8px;}
  .top-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px);}
  .top-btn:hover{border-color:var(--w2);color:var(--w2);}

  .particle{position:fixed;pointer-events:none;border-radius:50%;z-index:999;animation:pFly var(--pd,1s) ease-out forwards;}

  @media(max-width:480px){
    .str-card{width:72px;height:72px;}
    .str-card .ce{font-size:1.1rem;}
    .countdown-big{font-size:5rem;}
  }

  /* ── 설명 모달 ── */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.7);
    backdrop-filter:blur(6px);z-index:900;
    display:flex;align-items:center;justify-content:center;
    padding:20px;opacity:0;pointer-events:none;
    transition:opacity .25s;
  }
  .modal-backdrop.open{opacity:1;pointer-events:all;}
  .modal{
    background:#0f0f22;border:1px solid var(--border);
    border-radius:24px;padding:32px 28px;
    width:100%;max-width:480px;max-height:85vh;
    overflow-y:auto;position:relative;
    transform:translateY(16px);transition:transform .25s;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  .modal-backdrop.open .modal{transform:translateY(0);}
  .modal::-webkit-scrollbar{width:4px;}
  .modal::-webkit-scrollbar-thumb{background:rgba(255,154,86,.3);border-radius:2px;}
  .modal-close{
    position:absolute;top:16px;right:16px;
    width:32px;height:32px;border-radius:50%;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    color:var(--dim);font-size:1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;
  }
  .modal-close:hover{background:rgba(255,154,86,.15);border-color:var(--w1);color:var(--w1);}
  .modal-icon{font-size:2rem;margin-bottom:10px;text-align:center;}
  .modal-title{
    font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;
    letter-spacing:3px;color:var(--w2);text-align:center;
    margin-bottom:6px;
  }
  .modal-sub{font-size:.78rem;color:var(--dim);text-align:center;margin-bottom:20px;letter-spacing:.5px;}
  .modal-section{margin-bottom:18px;}
  .modal-section-title{
    font-size:.68rem;font-weight:700;letter-spacing:3px;
    text-transform:uppercase;color:var(--w1);
    margin-bottom:10px;display:flex;align-items:center;gap:8px;
  }
  .modal-section-title::before{content:'';display:inline-block;width:12px;height:2px;background:var(--w1);border-radius:2px;}
  .modal-step{
    display:flex;gap:12px;align-items:flex-start;
    padding:10px 12px;border-radius:12px;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
    margin-bottom:8px;
  }
  .modal-step-num{
    width:22px;height:22px;border-radius:50%;flex-shrink:0;
    background:rgba(255,154,86,.15);border:1px solid rgba(255,154,86,.3);
    color:var(--w1);font-size:.7rem;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    margin-top:1px;
  }
  .modal-step-text{font-size:.82rem;color:var(--text);line-height:1.6;}
  .modal-step-text strong{color:var(--w2);}
  .modal-tip{
    background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);
    border-radius:12px;padding:12px 14px;
    font-size:.8rem;color:rgba(255,243,232,.8);line-height:1.6;
  }
  .modal-tip::before{content:'💡 ';font-size:.85rem;}
  .modal-domain-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .modal-domain{flex:1;min-width:80px;padding:10px 8px;border-radius:12px;text-align:center;}
  .modal-domain .md-ico{font-size:1.1rem;margin-bottom:3px;}
  .modal-domain .md-name{font-size:.75rem;font-weight:700;}
  .modal-domain .md-desc{font-size:.65rem;opacity:.75;margin-top:2px;line-height:1.3;}
  .md-feel{background:rgba(244,114,182,.1);border:1px solid rgba(244,114,182,.25);color:var(--feel);}
  .md-think{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--think);}
  .md-do{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:var(--do);}
  .help-btn{
    display:inline-flex;align-items:center;gap:5px;
    padding:5px 14px;border-radius:20px;
    border:1px solid rgba(255,180,100,.25);background:transparent;
    color:var(--dim);font-size:.74rem;cursor:pointer;
    transition:all .2s;font-family:'Noto Sans KR',sans-serif;
  }
  .help-btn:hover{border-color:var(--w2);color:var(--w2);background:rgba(255,180,71,.08);}
</style>
</head>
<body>
<div class="stars" id="starsEl"></div>
<div class="overlay" id="overlay"></div>

<!-- ══ 설명 모달 ══ -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOutside(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- ══ 홈 ══ -->
<div class="screen active" id="homeScreen" style="justify-content:center;">
  <div class="logo" style="margin-bottom:4px;">✦ STRENGTH SLIDING</div>
  <div class="sub" style="margin-bottom:6px;">강점 슬라이딩 게임</div>
  <button class="help-btn" onclick="showModal('home')" style="margin-bottom:22px;">❓ 이 게임은 무엇인가요?</button>
  <div class="card-box">
    <div class="card-ttl" style="justify-content:space-between;">
      방 만들기 (강사)
      <button class="help-btn" onclick="showModal('host')">❓ 강사 안내</button>
    </div>
    <input type="text" id="hostName" placeholder="강사 이름" style="margin-bottom:10px;">
    <button class="btn" onclick="createRoom()" style="width:100%;">🏠 방 만들기</button>
  </div>
  <div class="card-box">
    <div class="card-ttl" style="justify-content:space-between;">
      방 입장하기 (참가자)
      <button class="help-btn" onclick="showModal('join')">❓ 참가자 안내</button>
    </div>
    <input type="text" id="joinName" placeholder="내 이름" style="margin-bottom:8px;">
    <input type="text" id="joinCode" placeholder="방 코드 (4자리)" style="margin-bottom:10px;text-transform:uppercase;letter-spacing:4px;font-family:'Orbitron',monospace;font-size:1rem;">
    <button class="btn" onclick="joinRoom()" style="width:100%;">🚪 입장하기</button>
  </div>
  <div id="homeMsg" style="margin-top:10px;font-size:.8rem;color:var(--red);min-height:18px;text-align:center;"></div>
</div>

<!-- ══ 대기실 (강사) ══ -->
<div class="screen" id="hostLobby" style="justify-content:center;">
  <div class="logo">✦ 대기실</div>
  <div class="card-box" style="text-align:center;max-width:420px;">
    <div class="card-ttl" style="justify-content:center;">방 코드 공유</div>
    <div class="room-code" id="displayCode">----</div>
    <div class="sub" style="margin-bottom:14px;">카톡으로 코드를 공유하세요</div>
    <div id="playerListHost" class="scrollable" style="text-align:left;margin-bottom:12px;"></div>
    <div id="playerCountHost" style="font-size:.78rem;color:var(--dim);margin-bottom:12px;"></div>
    <button class="btn" id="startBtn" onclick="hostStartGame()" disabled style="width:100%;">🎮 게임 시작</button>
    <div style="font-size:.72rem;color:var(--dim);margin-top:7px;">2명 이상 입장 시 시작 가능</div>
  </div>
</div>

<!-- ══ 대기실 (참가자) ══ -->
<div class="screen" id="joinLobby" style="justify-content:center;">
  <div class="logo">✦ 입장 완료</div>
  <div class="card-box" style="max-width:420px;text-align:center;">
    <div class="sub" style="margin-bottom:10px;">강사가 게임을 시작할 때까지 기다려주세요</div>
    <div style="font-family:'Orbitron',monospace;font-size:.85rem;color:var(--w2);letter-spacing:2px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite;">⏳ 대기 중...</div>
    <button class="help-btn" onclick="showModal('player')" style="margin-bottom:14px;">❓ 게임 진행 방법 보기</button>
    <div id="playerListJoin" class="scrollable" style="text-align:left;"></div>
  </div>
</div>

<!-- ══ 게임 화면 (참가자) ══ -->
<div class="screen" id="gameScreen">
  <div class="top-btns">
    <button class="top-btn" onclick="showModal('player')" title="도움말">❓</button>
    <button class="top-btn" onclick="toggleFS()" title="전체화면">⛶</button>
  </div>
  <div style="width:100%;max-width:640px;">
    <div class="round-banner">
      <div class="round-num" id="gameRoundNum">ROUND 1 / 4</div>
      <div class="round-desc" id="gameRoundDesc">내 강점과 가장 잘 어울리는 카드를 선택하세요</div>
    </div>

    <!-- 킵 카드 누적 -->
    <div class="card-box" id="keptAccumBox" style="margin-bottom:12px;display:none;">

// ── 유틸 ──
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function genCode(){ const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let r=''; for(let i=0;i<4;i++) r+=c[Math.floor(Math.random()*c.length)]; return r; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function showMsg(msg){ document.getElementById('homeMsg').textContent=msg; }

function catLabel(cat){ return cat==='feel'?'감성':cat==='think'?'이성':'행동'; }
function catClass(cat){ return cat==='feel'?'feel':cat==='think'?'think':'do'; }

// ── 카드 수에 따른 킵 제한 ──
function getMaxKeep(deckSize){
  if(deckSize >= 4) return 2;
  if(deckSize === 3) return 1;
  return deckSize; // 2장 이하: 전부 킵 가능
}

// ── 방 만들기 ──
async function createRoom(){
  const name = document.getElementById('hostName').value.trim();
  if(!name){ showMsg('이름을 입력해주세요'); return; }
  myName=name; isHost=true; myId='host';
  roomCode=genCode();
  roomRef=db.ref('rooms/'+roomCode);
  // 54장을 랜덤 섞어서 준비
  const shuffled = cryptoShuffle([...CARDS.map(c=>c.id)]);
  await roomRef.set({
    host:name, phase:'lobby', round:0,
    players:{ host:{name,isHost:true,ready:false,keptAll:[]} },
    masterDeck: shuffled,
    decks:{}, reveals:{}, slideCount:0
  });
  roomRef.onDisconnect().remove();
  document.getElementById('displayCode').textContent=roomCode;
  showScreen('hostLobby');
  listenRoom();
}

// ── 입장 ──
async function joinRoom(){
  const name=document.getElementById('joinName').value.trim();
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(!name){ showMsg('이름을 입력해주세요'); return; }
  if(code.length!==4){ showMsg('방 코드 4자리를 입력해주세요'); return; }
  const snap=await db.ref('rooms/'+code).once('value');
  if(!snap.exists()){ showMsg('방을 찾을 수 없습니다'); return; }
  const data=snap.val();
  if(data.phase!=='lobby'){ showMsg('이미 시작된 방입니다'); return; }
  const players=data.players||{};
  if(Object.values(players).find(p=>p.name===name)){ showMsg('같은 이름이 이미 있습니다'); return; }
  myName=name; myId='p_'+Date.now();
  roomCode=code; roomRef=db.ref('rooms/'+roomCode);
  await roomRef.child('players/'+myId).set({name,isHost:false,ready:false,keptAll:[]});
  roomRef.child('players/'+myId).onDisconnect().remove();
  showScreen('joinLobby');
  listenRoom();
}

// ── 리스너 ──
function listenRoom(){
  roomRef.on('value', snap=>{
    if(!snap.exists()) return;
    state=snap.val();
    updateUI(state);
  });
}

function updateUI(data){
  const phase=data.phase;
  const players=data.players||{};
  const pList=Object.entries(players);

  if(isHost){
    renderPlayerList('playerListHost', pList);
    document.getElementById('playerCountHost').textContent=`현재 ${pList.length}명 입장`;
    document.getElementById('startBtn').disabled=pList.length<2;
  } else {
    renderPlayerList('playerListJoin', pList);
  }

  if(phase==='lobby'){
    if(isHost) showScreen('hostLobby');
    else       showScreen('joinLobby');
  }
  else if(phase==='playing'){
    if(isHost){ showScreen('hostControl'); updateHostControl(data); }
    else      { showScreen('gameScreen');  updateGameScreen(data); }
  }
  else if(phase==='result'){
    buildResult(data);
  }
}

function renderPlayerList(elId, pList){
  const el=document.getElementById(elId);

// ── 카드 킵 토글 ──
async function toggleKeep(cardId){
  if(!state||state.phase!=='playing') return;
  const myReady=state.players&&state.players[myId]&&state.players[myId].ready;
  if(myReady) return;

  const myDeck=(state.decks&&state.decks[myId])||[];
  const maxKeep=getMaxKeep(myDeck.length);
  const myReveal=(state.reveals&&state.reveals[myId])||[];

  let newReveal=[...myReveal];
  if(newReveal.includes(cardId)){
    newReveal=newReveal.filter(id=>id!==cardId);
  } else {
    if(newReveal.length>=maxKeep){
      // 최대 초과 시 첫 번째 제거 후 추가
      newReveal.shift();
    }
    newReveal.push(cardId);
  }
  await roomRef.child('reveals/'+myId).set(newReveal);
}

// ── 킵 확정 ──
async function confirmKeep(){
  const myReveal=(state.reveals&&state.reveals[myId])||[];
  if(myReveal.length===0){ alert('카드를 선택해주세요!'); return; }
  const myReady=state.players&&state.players[myId]&&state.players[myId].ready;
  await roomRef.child('players/'+myId+'/ready').set(!myReady);
}

  overlay.innerHTML=`<div style="font-family:'Orbitron',monospace;font-size:1rem;color:var(--glow);letter-spacing:4px;margin-bottom:20px;">✦ 라운드 ${round} 공개! ✦</div>

        const c=CARD_MAP[cid]; if(!c) return '';

          <div class="rn">${p.name}</div>

  }</div>

    ${round<TOTAL_ROUNDS
      ? `<button class="btn btn-teal" onclick="closeRevealToSlide()">🔄 슬라이딩으로</button>`

// ── 슬라이딩 ──
async function doSlide(){
  const data=state;
  const players=data.players||{};
  const pIds=Object.keys(players).filter(id=>id!=='host');
  const reveals=data.reveals||{};
  const decks=data.decks||{};

  // 각 참가자의 킵하지 않은 카드(남은 카드)를 옆 사람에게 이동
  const updates={'reveals':{}};
  const newDecks={};

  pIds.forEach((pid,i)=>{
    const myDeck=decks[pid]||[];
    const kept=reveals[pid]||[];
    const remaining=myDeck.filter(cid=>!kept.includes(cid));
    // 다음 사람 인덱스 (순환)
    const nextIdx=(i+1)%pIds.length;
    const nextPid=pIds[nextIdx];
    newDecks[nextPid]=(newDecks[nextPid]||[]).concat(remaining);
  });

  // 덱 업데이트
  Object.entries(newDecks).forEach(([pid,deck])=>{
    updates['decks/'+pid]=deck;
  });
  // ready 초기화
  pIds.forEach(pid=>{ updates['players/'+pid+'/ready']=false; });

  await roomRef.update(updates);

  // 버튼 상태 변경
  document.getElementById('slideBtn').style.display='none';
  document.getElementById('nextRoundBtn').style.display='inline-block';
  document.getElementById('hostMsg').textContent='슬라이딩 완료! "다음 라운드" 버튼을 눌러주세요';
}

  const round=(state.round||1)+1;
  if(round>TOTAL_ROUNDS){
    await roomRef.update({phase:'result'});

  const updates={round,reveals:{}};
  const players=state.players||{};
  Object.keys(players).forEach(pid=>{ updates['players/'+pid+'/ready']=false; });
  await roomRef.update(updates);
  document.getElementById('nextRoundBtn').style.display='none';
  document.getElementById('revealBtn').style.display='inline-block';
  document.getElementById('hostMsg').textContent='';
}

// ── 파티클 ──
function spawnParticles(){
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  const colors=['#ff9a56','#ffd700','#ff6b9d','#a855f7','#2dd4bf','#4ade80'];
  for(let i=0;i<36;i++){
    const p=document.createElement('div'); p.className='particle';
    const sz=Math.random()*12+4, angle=Math.random()*360, dist=Math.random()*200+80;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${Math.cos(angle*Math.PI/180)*dist}px;--dy:${Math.sin(angle*Math.PI/180)*dist-80}px;--pd:${Math.random()*.6+.9}s;animation-delay:${Math.random()*.12}s;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),1600);
  }
}

// ── 셔플 ──
function cryptoShuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const range=i+1, limit=Math.floor(0x100000000/range)*range;
    let r; const buf=new Uint32Array(1);
    do{ crypto.getRandomValues(buf); r=buf[0]; }while(r>=limit);
    [a[i],a[r%range]]=[a[r%range],a[i]];
  }
  return a;
}

function showModal(type) {
  const content = MODAL_CONTENTS[type];
  if(!content) return;
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-icon">${content.icon}</div>
    <div class="modal-title">${content.title}</div>
    <div class="modal-sub">${content.sub}</div>
    ${content.html}
  `;
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if(e.target === document.getElementById('modalBackdrop')) closeModal();
}

// ── 전체화면 ──
function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
